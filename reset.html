<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset - Painel de Consultorias TR</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #003D5C 0%, #005580 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #FF8000;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        button {
            padding: 14px 32px;
            background: linear-gradient(135deg, #FF8000 0%, #E57300 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        button.secondary {
            background: #6B7280;
        }
        .success {
            color: #10B981;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Reset - Painel de Consultorias</h1>
        <p>
            Este utilitário irá limpar todos os dados armazenados no navegador
            e restaurar os dados padrão do sistema.
        </p>
        <p style="color: #EF4444; font-weight: 600;">
            ⚠️ Atenção: Esta ação não pode ser desfeita!
        </p>

        <button onclick="resetSystem()">🗑️ Limpar e Resetar Dados</button>
        <button class="secondary" onclick="goToSystem()">← Voltar ao Sistema</button>

        <div class="success" id="successMessage">
            ✅ Sistema resetado com sucesso!<br>
            <small>Redirecionando...</small>
        </div>
    </div>

    <script>
        function resetSystem() {
            if (!confirm('Tem certeza que deseja limpar TODOS os dados?')) {
                return;
            }

            // Limpar todo o localStorage
            localStorage.clear();
            sessionStorage.clear();

            // Mostrar mensagem de sucesso
            document.getElementById('successMessage').style.display = 'block';

            // Redirecionar após 2 segundos
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }

        function goToSystem() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
